<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>App Info</title>
    <style>
        :root{--bg1:#f7fbff;--bg2:#eef6ff;--card:#ffffff;--muted:#6b7280;--accent:#2563eb;--border:#e6e9ef}
        html,body{height:100%}
        body { margin:0; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background: linear-gradient(180deg,var(--bg1),var(--bg2)); display:flex; align-items:center; justify-content:center; padding:32px; color:#0f172a }
        .container{width:100%; max-width:900px}
        .card{background:var(--card); border-radius:12px; box-shadow:0 6px 18px rgba(15,23,42,0.06); border:1px solid var(--border); padding:28px}
        .header{display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:18px}
        h1{margin:0; font-size:1.4rem}
        .meta{color:var(--muted); font-size:0.95rem}
        .table{width:100%; border-collapse:collapse; margin-top:8px}
        th,td{padding:12px 14px; text-align:left; border-bottom:1px solid var(--border)}
        th{width:34%; font-weight:600; color:#374151; font-size:0.95rem}
        td{color:#0f172a; font-size:0.95rem}
        .row-odd td{background:rgba(37,99,235,0.03)}
        .badge{display:inline-block; padding:6px 10px; border-radius:999px; background:rgba(37,99,235,0.08); color:var(--accent); font-weight:600; font-size:0.85rem}
        @media (max-width:600px){
            .card{padding:18px}
            th,td{padding:10px}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div>
                    <h1>Application Information</h1>
                    <div class="meta">A small snapshot of the running app</div>
                </div>
                <div class="badge">v{{.Version}}</div>
            </div>

            <table class="table" role="table" aria-label="Application information">
                <tr class="row-odd"><th>Application Name</th><td>{{.AppName}}</td></tr>
                <tr><th>Version</th><td>{{.Version}}</td></tr>
                <tr class="row-odd"><th>Hostname</th><td>{{.Hostname}}</td></tr>
                <tr><th>Date/Time</th><td>{{.CurrentTime}}</td></tr>
                <tr class="row-odd"><th>Environment</th><td>{{.Environment}}</td></tr>
            </table>
        </div>
    </div>
</body>
</html>
